<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TicketHall — A menor taxa do Brasil em ingressos</title>
    <meta name="description" content="Compre e venda ingressos para eventos com a menor taxa do Brasil — apenas 7%. PIX, cartão e boleto." />
    <meta name="author" content="TicketHall" />
    <meta property="og:title" content="TicketHall — Ingressos com a menor taxa do Brasil" />
    <meta property="og:description" content="Plataforma de ingressos com apenas 7% de taxa. Crie, venda e gerencie eventos." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <!-- Google Fonts: preconnect + link (antes era @import no CSS, que bloqueava a renderização) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" />
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        // Prioritize light mode by default. Only apply dark if the user previously selected it.
        if (stored === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>

  <body>
    <!-- App shell: visível em T=0 enquanto React carrega. Substituído automaticamente por createRoot().render() -->
    <div id="root">
      <div style="min-height:100vh;background:hsl(0 0% 98%)">
        <header style="position:fixed;top:0;left:0;right:0;z-index:50;height:3.5rem;display:flex;align-items:center;padding:0 1.5rem">
          <span style="font-size:1.125rem;font-weight:700;letter-spacing:-0.025em;color:hsl(0 0% 8%)">TicketHall</span>
        </header>
        <section style="min-height:85vh;display:flex;align-items:center;justify-content:center">
          <div style="text-align:center;padding:5rem 1rem">
            <h1 style="font-family:'Sora',sans-serif;font-size:2.25rem;font-weight:700;line-height:1.1;color:hsl(0 0% 8%)">
              Seus ingressos para eventos
            </h1>
            <p style="margin-top:1.5rem;font-size:1.125rem;line-height:1.75;color:hsl(0 0% 64%);max-width:36rem;margin-left:auto;margin-right:auto">
              Compre, transfira e gerencie seus ingressos com seguranca.
            </p>
          </div>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
